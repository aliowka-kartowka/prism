server {
    listen 80;
    server_name vpn.freenet.monster;
    return 301 https://vpn.freenet.monster$request_uri;
}

server {
    listen 443 ssl;
    server_name vpn.freenet.monster;

    ssl_certificate     /etc/letsencrypt/live/vpn.freenet.monster/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vpn.freenet.monster/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Add HSTS and other security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
    }
}
