<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeNet System Console</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #000;
            --accent: #64ffda;
            --font-mono: "JetBrains Mono", monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: #d1d1d1;
            font-family: var(--font-mono);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #111;
            padding: 10px 20px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Outfit', sans-serif;
        }

        .brand {
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .status {
            font-size: 0.8rem;
            color: #888;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #555;
        }

        .status-dot.active {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        .tab-btn {
            background: transparent;
            border: 1px solid #333;
            color: #888;
            padding: 5px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .tab-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(100, 255, 218, 0.05);
        }

        .tab-content {
            display: none;
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .tab-content.active {
            display: block;
        }

        /* Node Status Styles */
        .node-card {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .node-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }

        .node-name {
            font-weight: bold;
            color: var(--accent);
            font-size: 1.1rem;
        }

        .node-meta {
            font-size: 0.8rem;
            color: #666;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .res-item {
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
        }

        .status-up {
            color: #64ffda;
        }

        .status-down {
            color: #ff4d4d;
        }

        #terminal-sys,
        #terminal-xray {
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .log-line {
            margin-bottom: 4px;
            border-left: 2px solid transparent;
            padding-left: 10px;
        }

        .log-line:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .log-info {
            color: #64ffda;
            border-color: #64ffda;
        }

        .log-error {
            color: #ff4d4d;
            border-color: #ff4d4d;
            font-weight: bold;
        }

        .log-warn {
            color: #ffcc00;
            border-color: #ffcc00;
        }

        .log-time {
            color: #555;
            margin-right: 12px;
        }

        #auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        input {
            background: #111;
            border: 1px solid #333;
            color: var(--accent);
            padding: 12px 20px;
            border-radius: 4px;
            outline: none;
            width: 300px;
            text-align: center;
            font-family: var(--font-mono);
            margin-bottom: 20px;
        }

        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 40px;
            border-radius: 4px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }
    </style>
</head>

<body>
    <div id="auth-overlay">
        <div class="brand" style="font-size: 1.5rem; margin-bottom: 30px;">SYSTEM ACCESS RESTRICTED</div>
        <input type="password" id="password" placeholder="ENTER ADMIN PASSWORD"
            onkeyup="if(event.key==='Enter') login()">
        <button onclick="login()">AUTHORIZE</button>
    </div>

    <div class="header">
        <div style="display:flex; align-items:center; gap:20px;">
            <div class="brand">FREENET // OPS_CENTER_v1.1</div>
            <div id="tabs" style="display:flex; gap:10px; margin-left:20px;">
                <button class="tab-btn active" onclick="showTab('sys')">System Logs</button>
                <button class="tab-btn" onclick="showTab('nodes')">Node Status</button>
                <button class="tab-btn" onclick="showTab('traffic')">User Traffic</button>
                <button class="tab-btn" onclick="showTab('stripe')">Stripe Monitor</button>
                <button class="tab-btn" onclick="showTab('xray')">Xray Feed</button>
            </div>
        </div>
        <div class="status">
            <div id="dot" class="status-dot"></div>
            <span id="statusText">STANDBY</span>
        </div>
    </div>

    <div id="terminal-sys" class="tab-content active">
        <div class="log-line">Waiting for authorization sequence...</div>
    </div>

    <div id="terminal-nodes" class="tab-content">
        <div id="nodeList">
            <div class="log-line">Fetching node states...</div>
        </div>
    </div>

    <div id="terminal-traffic" class="tab-content">
        <table style="width:100%; border-collapse: collapse; margin-top:20px;">
            <thead>
                <tr style="text-align:left; color: var(--accent); border-bottom: 1px solid #333;">
                    <th style="padding:10px;">Username</th>
                    <th style="padding:10px;">Status</th>
                    <th style="padding:10px;">Used</th>
                    <th style="padding:10px;">Limit</th>
                    <th style="padding:10px;">Expiry</th>
                </tr>
            </thead>
            <tbody id="trafficBody"></tbody>
        </table>
    </div>

    <div id="terminal-xray" class="tab-content">
        <div class="log-line">Fetching Xray core logs...</div>
    </div>

    <script>
        let token = localStorage.getItem('console_token');
        let currentTab = 'sys';
        let refreshInterval = 3000;

        if (token) {
            document.getElementById('auth-overlay').style.display = 'none';
            startStream();
        }

        function showTab(id) {
            currentTab = id;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            // Fixed selector to find the button by lowercased ID in onclick or text
            const activeBtn = Array.from(document.querySelectorAll('.tab-btn')).find(b =>
                b.getAttribute('onclick').includes(`'${id}'`)
            );
            if (activeBtn) activeBtn.classList.add('active');
            document.getElementById('terminal-' + id).classList.add('active');
            fetchData();
            restartInterval(); // Adjust polling speed for new tab
        }

        function login() {
            const pass = document.getElementById('password').value;
            if (!pass) return;
            token = pass;
            localStorage.setItem('console_token', token);
            document.getElementById('auth-overlay').style.display = 'none';
            startStream();
        }

        let intervalHandle = null;
        const INTERVALS = { traffic: 1000, sys: 3000, nodes: 3000, stripe: 5000, xray: 3000 };

        function getInterval() { return INTERVALS[currentTab] || 3000; }

        function restartInterval() {
            if (intervalHandle) clearInterval(intervalHandle);
            intervalHandle = setInterval(fetchData, getInterval());
        }

        function startStream() {
            fetchData();
            restartInterval();
            document.getElementById('dot').classList.add('active');
            document.getElementById('statusText').textContent = 'CONNECTED';
        }

        function fetchData() {
            if (currentTab === 'sys') fetchLogs();
            if (currentTab === 'nodes') fetchNodes();
            if (currentTab === 'traffic') fetchTraffic();
            if (currentTab === 'stripe') fetchStripeLogs();
            if (currentTab === 'xray') fetchXrayLogs();
        }

        async function fetchLogs() {
            try {
                const res = await fetch(`/api/logs?token=${encodeURIComponent(token)}`);
                updateTerminal('terminal-sys', res);
            } catch (e) { handleErr(); }
        }

        async function fetchNodes() {
            try {
                const res = await fetch(`/api/status?token=${encodeURIComponent(token)}`);
                if (res.status === 401) { logout(); return; }
                const data = await res.json();

                const list = document.getElementById('nodeList');
                list.innerHTML = '';

                if (Object.keys(data).length === 0) {
                    list.innerHTML = '<div class="log-line log-warn">No nodes reporting yet...</div>';
                    return;
                }

                for (const [nodeId, info] of Object.entries(data)) {
                    const card = document.createElement('div');
                    card.className = 'node-card';

                    const lastSeen = new Date(info.timestamp * 1000).toLocaleTimeString();
                    const age = Math.round(Date.now() / 1000 - info.timestamp);
                    const statusClass = age < 60 ? 'active' : '';

                    let resultsHtml = '';
                    if (info.results) {
                        for (const [url, status] of Object.entries(info.results)) {
                            const domain = url.replace('https://', '').replace('http://', '').split('/')[0];
                            const sClass = status === 'up' ? 'status-up' : 'status-down';
                            resultsHtml += `<div class="res-item"><span>${domain}</span><span class="${sClass}">${status.toUpperCase()}</span></div>`;
                        }
                    }

                    card.innerHTML = `
                        <div class="node-header">
                            <div>
                                <span class="node-name">${nodeId.toUpperCase()}</span>
                                <span class="node-meta" style="margin-left: 10px;">Seen ${lastSeen} (${age}s ago)</span>
                            </div>
                            <div class="status-dot ${statusClass}"></div>
                        </div>
                        <div class="results-grid">${resultsHtml || 'No results reported'}</div>
                    `;
                    list.appendChild(card);
                }
            } catch (e) { handleErr(); }
        }

        async function fetchXrayLogs() {
            try {
                const res = await fetch(`/api/marzban/logs?token=${encodeURIComponent(token)}`);
                updateTerminal('terminal-xray', res);
            } catch (e) { handleErr(); }
        }

        async function fetchStripeLogs() {
            try {
                const res = await fetch(`/api/stripe/logs?token=${encodeURIComponent(token)}`);
                updateTerminal('terminal-stripe', res);
            } catch (e) { handleErr(); }
        }

        async function updateTerminal(id, res) {
            if (res.status === 401) { logout(); return; }
            const data = await res.json();
            const term = document.getElementById(id);
            const isAtBottom = term.scrollHeight - term.scrollTop <= term.clientHeight + 100;

            const logs = Array.isArray(data.logs) ? data.logs : (data.content || "").split('\n');

            term.innerHTML = '';
            logs.forEach(line => {
                if (!line.trim()) return;
                // Filter out internal polling and API noise in both local and Xray logs
                if (line.includes('/api/logs') || line.includes('/api/marzban') ||
                    line.includes('GET /api/') || line.includes('POST /api/admin/token') ||
                    line.includes('/api/status') || line.includes('/api/update')) return;

                const div = document.createElement('div');
                div.className = 'log-line';
                if (line.includes('INFO') || line.includes('info')) div.classList.add('log-info');
                if (line.includes('ERROR') || line.includes('error') || line.includes('failed')) div.classList.add('log-error');
                if (line.includes('WARNING') || line.includes('warning')) div.classList.add('log-warn');
                div.textContent = line;
                term.appendChild(div);
            });
            if (isAtBottom) term.scrollTop = term.scrollHeight;
        }

        async function fetchTraffic() {
            try {
                const res = await fetch(`/api/marzban/users?token=${encodeURIComponent(token)}`);
                if (res.status === 401) { logout(); return; }
                const data = await res.json();
                const users = data.users || []; // Handle {users: [], total: X} format

                const body = document.getElementById('trafficBody');
                body.innerHTML = '';

                users.forEach(u => {
                    const tr = document.createElement('tr');
                    tr.style.borderBottom = '1px solid #222';
                    const used = (u.used_traffic / (1024 ** 3)).toFixed(2);
                    const limit = u.data_limit ? (u.data_limit / (1024 ** 3)).toFixed(2) : "∞";
                    const expiry = u.expire ? new Date(u.expire * 1000).toLocaleDateString() : "Never";

                    tr.innerHTML = `
                        <td style="padding:10px;">${u.username}</td>
                        <td style="padding:10px;"><span style="color:${u.status === 'active' ? '#64ffda' : '#ff4d4d'}">${u.status}</span></td>
                        <td style="padding:10px;">${used} GB</td>
                        <td style="padding:10px;">${limit} GB</td>
                        <td style="padding:10px; font-size:0.8rem; color:#666;">${expiry}</td>
                    `;
                    body.appendChild(tr);
                });
            } catch (e) { handleErr(); }
        }

        function logout() {
            localStorage.removeItem('console_token');
            location.reload();
        }

        function handleErr() {
            document.getElementById('dot').classList.remove('active');
            document.getElementById('statusText').textContent = 'CONNECTION LOST';
        }
    </script>
</body>

</html>
